<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>병원 공간기획 · 3D 재배치 스튜디오 v2</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a323d;
    --txt:#e6edf3; --muted:#9aa7b4; --accent:#4c8dff; --danger:#ff5d5d; --ok:#39d98a; --up:#39d98a; --down:#ff6b6b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:'Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;}
  button{font-family:inherit;cursor:pointer;}
  .app{display:grid;grid-template-columns:250px 1fr 330px;grid-template-rows:48px 1fr;height:100%;}
  header{grid-column:1/4;display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;}
  header .logo{font-weight:700;font-size:14px;letter-spacing:-.3px;white-space:nowrap;}
  header .logo span{color:var(--accent);}
  .tbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 10px;border-radius:7px;font-size:12px;white-space:nowrap;}
  .tbtn:hover{border-color:var(--accent);}
  .tbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tbtn.on{background:#f5b642;border-color:#f5b642;color:#0e1116;}
  .sep{width:1px;height:22px;background:var(--line);margin:0 2px;}
  .spacer{flex:1;}
  aside.left{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;}
  aside.left .head{padding:11px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
  .hist{flex:1;overflow:auto;padding:8px;}
  .hitem{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-bottom:7px;cursor:pointer;}
  .hitem:hover{border-color:var(--accent);}
  .hitem .t{font-size:12.5px;font-weight:600;margin-bottom:3px;}
  .hitem .d{font-size:10.5px;color:var(--muted);}
  main{position:relative;min-height:0;background:radial-gradient(circle at 50% 30%,#1a2230,#0b0e13);}
  #c{width:100%;height:100%;display:block;}
  .floorbar{position:absolute;left:12px;top:12px;background:rgba(22,27,34,.9);border:1px solid var(--line);border-radius:9px;padding:8px;backdrop-filter:blur(6px);max-width:200px;}
  .floorbar .ttl{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .frow{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .frow button.fsel{flex:1;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:5px 8px;border-radius:6px;font-size:12px;}
  .frow button.fsel.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .frow .x{background:transparent;border:none;color:var(--muted);font-size:14px;padding:2px 4px;}
  .legend{position:absolute;right:12px;bottom:12px;background:rgba(22,27,34,.9);border:1px solid var(--line);border-radius:9px;padding:10px;font-size:11px;max-width:230px;}
  .legend .li{display:flex;align-items:center;gap:7px;margin:3px 0;cursor:pointer;}
  .legend .sw{width:13px;height:13px;border-radius:3px;flex:none;}
  .hint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-size:11px;color:var(--muted);background:rgba(0,0,0,.45);padding:5px 12px;border-radius:20px;text-align:center;}
  .drawbar{position:absolute;left:50%;top:54px;transform:translateX(-50%);background:#f5b642;color:#0e1116;font-weight:600;font-size:12px;padding:7px 12px;border-radius:8px;display:flex;gap:8px;align-items:center;z-index:5;}
  .drawbar button{background:#0e1116;color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:12px;}
  aside.right{background:var(--panel);border-left:1px solid var(--line);overflow:auto;padding:14px;min-height:0;}
  .sec{margin-bottom:16px;}
  .sec h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px;}
  label{display:block;font-size:11px;color:var(--muted);margin:8px 0 3px;}
  input[type=text],input[type=number],select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:7px 8px;font-size:12.5px;font-family:inherit;}
  textarea{resize:vertical;min-height:52px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .memohint{font-size:10.5px;color:var(--muted);text-align:right;margin-top:2px;}
  .del{background:transparent;border:1px solid var(--danger);color:var(--danger);width:100%;padding:8px;border-radius:7px;font-size:12.5px;margin-top:10px;}
  .del:hover{background:var(--danger);color:#fff;}
  .empty{color:var(--muted);font-size:12.5px;line-height:1.6;}
  .chk{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:9px;font-size:11.5px;line-height:1.5;margin-bottom:6px;}
  .chk.pass{border-left:3px solid var(--ok);}
  .chk.warn{border-left:3px solid #f5b642;}
  .chk .h{font-weight:600;margin-bottom:2px;}
  .chk .n{color:var(--muted);font-size:10.5px;}
  .badge{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--muted);}
  .stat{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dashed var(--line);}
  .hidden{display:none !important;}
  /* 좌측 탭 */
  .tabs{display:flex;border-bottom:1px solid var(--line);}
  .tabs button{flex:1;background:transparent;border:none;color:var(--muted);padding:9px 4px;font-size:11.5px;border-bottom:2px solid transparent;}
  .tabs button.active{color:var(--txt);border-bottom-color:var(--accent);}
  .pane{flex:1;overflow:auto;padding:8px;min-height:0;}
  .catgrp{margin-bottom:6px;}
  .catgrp .ch{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 6px;cursor:pointer;border-radius:6px;}
  .catgrp .ch:hover{background:var(--panel2);}
  .catgrp .sw{width:12px;height:12px;border-radius:3px;flex:none;}
  .catgrp .cnt{margin-left:auto;font-size:10.5px;color:var(--muted);}
  .sitem{font-size:11.5px;padding:4px 8px 4px 26px;color:var(--muted);cursor:pointer;border-radius:5px;display:flex;justify-content:space-between;gap:6px;}
  .sitem:hover{background:var(--panel2);color:var(--txt);}
  .sitem.sel{color:var(--accent);}
  .chatlog{flex:1;overflow:auto;padding:9px;display:flex;flex-direction:column;gap:7px;}
  .msg{padding:7px 9px;border-radius:9px;font-size:12px;line-height:1.45;max-width:93%;white-space:pre-wrap;}
  .msg.user{background:var(--accent);color:#fff;align-self:flex-end;}
  .msg.sys{background:var(--panel2);border:1px solid var(--line);align-self:flex-start;}
  .chatin{display:flex;gap:6px;padding:8px;border-top:1px solid var(--line);}
  .chatin textarea{min-height:40px;height:40px;}
  .lawlink{display:block;font-size:11.5px;color:var(--accent);text-decoration:none;padding:4px 0;border-bottom:1px dashed var(--line);}
  .lawlink:hover{text-decoration:underline;}
  .pathbar{position:absolute;left:50%;top:54px;transform:translateX(-50%);background:rgba(22,27,34,.96);border:1px solid var(--line);color:var(--txt);font-size:12px;padding:8px 12px;border-radius:10px;display:flex;gap:10px;align-items:center;z-index:5;}
  .pathbar .sw{width:20px;height:20px;border-radius:5px;border:2px solid #ffffff33;cursor:pointer;}
  .pathbar .sw.sel{border-color:#fff;}
  .pathbar select{width:auto;padding:4px 6px;}
  .pathbar button{background:#0e1116;color:#fff;border:1px solid var(--line);padding:4px 10px;border-radius:6px;}
  .titleovl{position:absolute;left:50%;top:12px;transform:translateX(-50%);z-index:4;}
  .titleovl input{background:rgba(22,27,34,.85);border:1px solid var(--line);color:var(--txt);text-align:center;font-size:15px;font-weight:700;padding:5px 16px;border-radius:8px;width:360px;}
  /* 모달 */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;width:min(860px,94vw);max-height:88vh;overflow:auto;padding:20px;}
  .modal h2{margin:0 0 4px;font-size:17px;}
  .modal .sub{color:var(--muted);font-size:12px;margin-bottom:14px;}
  .modal .close{float:right;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:5px 10px;}
  table.at{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.at th,table.at td{border-bottom:1px solid var(--line);padding:7px 9px;text-align:right;}
  table.at th:first-child,table.at td:first-child{text-align:left;}
  table.at th{color:var(--muted);font-weight:600;font-size:11px;}
  table.at tfoot td{font-weight:700;border-top:2px solid var(--line);}
  .up{color:var(--up);} .down{color:var(--down);}
  .cmpgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .pick{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .pick select{width:auto;flex:1;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🏥 <span>3D 재배치 스튜디오</span></div>
    <button class="tbtn" id="btnAddFloor">＋층</button>
    <button class="tbtn primary" id="btnAddSpace">＋공간(사각)</button>
    <button class="tbtn" id="btnDraw">✏ 실 외곽선 그리기</button>
    <label class="tbtn" style="display:inline-flex;align-items:center;gap:5px;margin:0;">📄 PDF 깔기<input type="file" id="pdfInput" accept="application/pdf" multiple class="hidden"></label>
    <label class="tbtn" style="display:inline-flex;align-items:center;gap:5px;margin:0;">📐 CAD(DXF) 깔기<input type="file" id="cadInput" accept=".dxf,.dwg" multiple class="hidden"></label>
    <button class="tbtn" id="btnPath">🚶 동선 그리기</button>
    <button class="tbtn" id="btnErase">🧽 지우개</button>
    <button class="tbtn" id="btnLabels" title="도형을 클릭해 선택한 뒤 누르면 그 공간의 이름만 표시됩니다">🏷 명칭표시</button>
    <button class="tbtn on" id="btnSnap" title="도형을 실선(도면)·다른 공간 모서리에 자동으로 붙임">🧲 스냅</button>
    <button class="tbtn" id="btnUndo" title="실행취소 (Ctrl+Z)">↶ 되돌리기</button>
    <div class="sep"></div>
    <button class="tbtn" id="btnBaseline">📌 기준안 지정</button>
    <button class="tbtn" id="btnDelta">📊 면적 증감표</button>
    <button class="tbtn" id="btnCompare">🆚 안 비교</button>
    <button class="tbtn" id="btnReport">📄 보고서</button>
    <button class="tbtn" id="btnCapture">📷 캡처</button>
    <div class="spacer"></div>
    <button class="tbtn" id="btnSnapshot">💾 작업 저장</button>
    <button class="tbtn" id="btnExport">⬇JSON</button>
    <label class="tbtn" style="margin:0;">⬆불러오기<input type="file" id="importInput" accept="application/json" class="hidden"></label>
  </header>

  <aside class="left">
    <div class="tabs">
      <button id="tabHist" class="active" data-tab="hist">🕘 히스토리</button>
      <button id="tabCat" data-tab="cat">🗂 공간분류</button>
      <button id="tabAI" data-tab="ai">🤖 AI배치</button>
    </div>
    <div id="paneHist" class="pane">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:11px;color:var(--muted)">작업 히스토리</span><button class="tbtn" id="btnNewProj" style="padding:3px 8px;font-size:11px;">새 안</button></div>
      <div id="histList"></div>
    </div>
    <div id="paneCat" class="pane hidden"><div id="catTree"></div></div>
    <div id="paneAI" class="pane hidden" style="display:none;flex-direction:column;padding:0;">
      <div class="chatlog" id="chatLog"></div>
      <div class="chatin"><textarea id="chatInput" placeholder="예) 3층에 외래 진료실 6개, CT실 1개, 병실 30병상, 대기실 1개 배치해줘"></textarea><button class="tbtn primary" id="chatSend" style="align-self:stretch;">생성</button></div>
    </div>
  </aside>

  <main>
    <canvas id="c"></canvas>
    <div class="titleovl"><input id="sceneTitle" placeholder="배치안 제목 입력..." maxlength="60"></div>
    <div class="floorbar"><div class="ttl">층(FLOOR)</div><div id="floorRows"></div></div>
    <div class="legend" id="legend"></div>
    <div class="hint" id="hint">좌드래그: 이동 · <b>노란 핸들 드래그: 크기조절</b> · 우드래그: 회전 · 휠: 확대 · 층 더블클릭: 단독 편집</div>
    <div class="drawbar hidden" id="drawbar">✏ 그리기 모드 — 바닥을 클릭해 꼭짓점 추가 <button id="drawDone">완료</button><button id="drawCancel">취소</button></div>
    <div class="pathbar hidden" id="pathbar">🚶 동선 —
      <select id="pathKind"><option>환자</option><option>물류</option><option>직원</option><option>응급</option><option>면회객</option></select>
      <span id="pathColors" style="display:flex;gap:5px;"></span>
      굵기<input type="range" id="pathWidth" min="1" max="8" step="0.5" value="3" style="width:80px"><span id="pathWval">3</span>
      <button id="pathDone">완료</button>
    </div>
  </main>

  <aside class="right" id="rightPanel"></aside>
</div>
<div id="modalRoot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const CATS = {
  '외래·진료':0x4c8dff,'병동·병실':0x39d98a,'수술·시술':0xff6b8b,'검사·영상':0xb06bff,
  '응급':0xff8a3d,'중환자실':0xff5d5d,'약제·공급':0xf5c542,'행정·사무':0x8c99a8,
  '편의·후생':0x2ec9c0,'설비·기계':0xa9805a,'로비·공용':0xcfd8e3,
};
const CAT_KEYS=Object.keys(CATS);
const FLOOR_H=3.6, SLAB_T=0.15, FOCUS_Y=6;

let db=load(), project=null, activeFloorId=null, selectedId=null, focusFloorId=null;
let hiddenCats=new Set(), drawing=false, drawPts=[];
let pathMode=false, eraseMode=false, pathCapturing=false, curPath=null;
let pathColor=0xff3b3b, pathWidth=3, pathKind='환자';
let undoStack=[];
const GHOST_GAP=2.0;   // 포커스 모드에서 겹쳐 보이는 반투명 층 간격
/* 실행취소용 스냅샷: 구조 변경 전에 호출 */
function pushUndo(){ if(!project)return; undoStack.push(JSON.stringify({floors:project.floors,gap:project.floorGap,spread:project.spread})); if(undoStack.length>50)undoStack.shift(); updateUndoBtn(); }
function undo(){ if(!undoStack.length)return; const st=JSON.parse(undoStack.pop());
  project.floors=st.floors; project.floorGap=st.gap; project.spread=st.spread;
  if(focusFloorId && !getFloor(focusFloorId)) focusFloorId=null;
  if(!getFloor(activeFloorId)) activeFloorId=project.floors[0]?.id; selectedId=null;
  persist(); rebuildScene(); renderAll(); updateUndoBtn(); }
function updateUndoBtn(){ const b=document.getElementById('btnUndo'); if(b){ b.disabled=!undoStack.length; b.style.opacity=undoStack.length?1:.45; } }

function load(){ try{const d=JSON.parse(localStorage.getItem('hsp_db2'));if(d&&d.projects)return d;}catch(e){} return {projects:[],activeId:null}; }
function persist(){ localStorage.setItem('hsp_db2',JSON.stringify(db)); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function makeFloor(level){ return {id:uid(),name:level+'층',level,w:44,d:30,pdf:null,spaces:[],paths:[]}; }
function newProject(name){
  const p={id:uid(),name:name||('병원 배치안 '+(db.projects.length+1)),createdAt:Date.now(),floors:[makeFloor(1)],history:[],baseline:null};
  db.projects.unshift(p); db.activeId=p.id; persist(); return p;
}

/* ---------- 면적 계산 ---------- */
function spaceArea(s){ return s.shape==='poly'? polyArea(s.points) : s.w*s.d; }
function polyArea(pts){ let a=0; for(let i=0;i<pts.length;i++){ const p=pts[i],q=pts[(i+1)%pts.length]; a+=p[0]*q[1]-q[0]*p[1]; } return Math.abs(a/2); }
function polyCentroid(pts){ let x=0,z=0; pts.forEach(p=>{x+=p[0];z+=p[1];}); return [x/pts.length,z/pts.length]; }
function catTotals(floors){ const m={}; floors.forEach(f=>f.spaces.forEach(s=>{ m[s.category]=(m[s.category]||0)+spaceArea(s); })); return m; }
function totalArea(floors){ let a=0; floors.forEach(f=>f.spaces.forEach(s=>a+=spaceArea(s))); return a; }

/* ---------- 3D ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0b0e13);
const camera=new THREE.PerspectiveCamera(45,1,0.1,3000); camera.position.set(48,46,58);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.target.set(0,6,0);
scene.add(new THREE.AmbientLight(0xffffff,0.78));
const dir=new THREE.DirectionalLight(0xffffff,0.85); dir.position.set(30,60,20); scene.add(dir);
const grid=new THREE.GridHelper(140,70,0x2a323d,0x1a2029); grid.position.y=-0.01; scene.add(grid);
const worldRoot=new THREE.Group(); scene.add(worldRoot);
const drawHelper=new THREE.Group(); scene.add(drawHelper);
const spaceMeshes=new Map(), floorGroups=new Map(), pathMeshes=new Map();

function resize(){ const w=canvas.clientWidth,h=canvas.clientHeight; if(canvas.width!==w||canvas.height!==h){renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();} }
let tween=null;
function flyTo(camTo,tgtTo,dur){ tween={fc:camera.position.clone(),tc:camTo,ft:controls.target.clone(),tt:tgtTo,t0:performance.now(),dur:dur||650}; }
function animate(){ resize();
  if(tween){ let k=(performance.now()-tween.t0)/tween.dur; if(k>=1){k=1;} const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    camera.position.lerpVectors(tween.fc,tween.tc,e); controls.target.lerpVectors(tween.ft,tween.tt,e); if(k>=1)tween=null; }
  controls.update(); renderer.render(scene,camera); requestAnimationFrame(animate); }
animate();

function rebuildScene(){
  worldRoot.clear(); spaceMeshes.clear(); floorGroups.clear(); pathMeshes.clear(); handleMeshes.length=0;
  if(!project) return;
  const gap=(project.floorGap==null?FLOOR_H:project.floorGap);
  if(focusFloorId){                       // 단독 편집(포커스) 모드
    const cf=getFloor(focusFloorId);
    if(cf){
      // 나머지 모든 층을 반투명(ghost)으로 겹쳐 표시 → 상하층 위치 정렬 확인
      project.floors.forEach(f=>{ if(f.id!==focusFloorId) worldRoot.add(buildFloorGroup(f,FOCUS_Y+(f.level-cf.level)*GHOST_GAP,true)); });
      worldRoot.add(buildFloorGroup(cf,FOCUS_Y,false));
      return;
    }
    focusFloorId=null;
  }
  const sorted=[...project.floors].sort((a,b)=>a.level-b.level);
  sorted.forEach((f,idx)=> worldRoot.add(buildFloorGroup(f, project.spread?0:idx*gap, false)));
}
function buildFloorGroup(f,y,ghost){
  const g=new THREE.Group(); g.position.set(f.ox||0, y, f.oz||0); floorGroups.set(f.id,g);
  const slab=new THREE.Mesh(new THREE.BoxGeometry(f.w,SLAB_T,f.d),new THREE.MeshStandardMaterial({color:0x20272f,roughness:.95,transparent:true,opacity:ghost?0.05:1}));
  slab.position.y=-SLAB_T/2; slab.userData={floorId:f.id,slab:true}; g.add(slab);
  if(f.pdf && !ghost){ const tex=new THREE.TextureLoader().load(f.pdf);
    const plane=new THREE.Mesh(new THREE.PlaneGeometry(f.w,f.d),new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:.85}));
    plane.rotation.x=-Math.PI/2; plane.position.y=0.02; g.add(plane); }
  const edge=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(f.w,SLAB_T,f.d)),
    new THREE.LineBasicMaterial({color:ghost?0x394a5a:(f.id===activeFloorId?0x4c8dff:0x39424f),transparent:true,opacity:ghost?.5:1})); edge.position.y=-SLAB_T/2; g.add(edge);
  f.spaces.forEach(s=>g.add(buildSpaceMesh(f,s,ghost)));

  if(!ghost){ f.spaces.forEach(s=>{ if(!s.showName) return;
    const c=s.shape==='poly'?polyCentroid(s.points):[s.x,s.z];

/* 동선 튜브 */
function buildPathMesh(f,pa){

  if(pts.length>=2){ const curve=new THREE.CatmullRomCurve3(pts);
    mesh=new THREE.Mesh(new THREE.TubeGeometry(curve,Math.max(8,pts.length*4),(pa.width||3)*0.14,7,false),
      new THREE.MeshStandardMaterial({color:pa.color||0xff3b3b,roughness:.4,emissive:pa.color||0xff3b3b,emissiveIntensity:.25}));
  } else { mesh=new THREE.Mesh(new THREE.SphereGeometry((pa.width||3)*0.14),new THREE.MeshStandardMaterial({color:pa.color||0xff3b3b})); mesh.position.copy(pts[0]||new THREE.Vector3()); }

}
/* 캔버스 텍스트 라벨 스프라이트 */
function makeLabelSprite(text){
  const c=document.createElement('canvas'); c.width=256; c.height=64; const x=c.getContext('2d');
  x.fillStyle='rgba(10,14,20,.78)'; x.strokeStyle='rgba(120,150,190,.6)'; x.lineWidth=2;
  const r=10; x.beginPath(); x.moveTo(r,2); x.arcTo(254,2,254,62,r); x.arcTo(254,62,2,62,r); x.arcTo(2,62,2,2,r); x.arcTo(2,2,254,2,r); x.closePath(); x.fill(); x.stroke();
  x.fillStyle='#fff'; x.font='bold 26px "Malgun Gothic",sans-serif'; x.textAlign='center'; x.textBaseline='middle';
  let t=(text||'').slice(0,12); x.fillText(t,128,33);

  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false}));

}
function buildSpaceMesh(f,s,ghost){
  const color=CATS[s.category]??0x888888, h=s.h||3;
  let geo;
  if(s.shape==='poly'){
    const shp=new THREE.Shape();
    s.points.forEach((p,i)=> i?shp.lineTo(p[0],-p[1]):shp.moveTo(p[0],-p[1]));
    geo=new THREE.ExtrudeGeometry(shp,{depth:h,bevelEnabled:false}); geo.rotateX(-Math.PI/2);
  } else geo=new THREE.BoxGeometry(s.w,h,s.d);
  const op=ghost?0.13:(hiddenCats.has(s.category)?0.05:0.92);
  const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color,roughness:.55,metalness:.05,transparent:true,opacity:op}));
  if(s.shape==='poly') mesh.position.set(0,0,0); else mesh.position.set(s.x,h/2,s.z);
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0x0b0e13,transparent:true,opacity:ghost?.15:.35})));
  mesh.userData={spaceId:s.id,floorId:f.id};

  if(s.id===selectedId){ mesh.material.emissive=new THREE.Color(0xffffff); mesh.material.emissiveIntensity=.35; }

}

/* ---------- 픽킹 & 드래그 ---------- */
const ray=new THREE.Raycaster(), ptr=new THREE.Vector2();

let resizing=null; const handleMeshes=[];
/* 선택 도형의 크기조절 핸들 */
function makeHandle(){ return new THREE.Mesh(new THREE.BoxGeometry(0.9,0.9,0.9),new THREE.MeshBasicMaterial({color:0xffd166})); }
function addResizeHandles(g,f){ if(!selectedId) return; const s=f.spaces.find(x=>x.id===selectedId); if(!s) return;
  const top=(s.h||3)+0.15;
  if(s.shape==='poly'){ let mx=-1e9,mz=-1e9; s.points.forEach(p=>{ if(p[0]>mx)mx=p[0]; if(p[1]>mz)mz=p[1]; });
    const m=makeHandle(); m.position.set(mx,top,mz); m.userData={resize:true,spaceId:s.id,poly:true}; g.add(m); handleMeshes.push(m); }
  else { [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx,sz])=>{ const m=makeHandle(); m.position.set(s.x+sx*s.w/2,top,s.z+sz*s.d/2);
    m.userData={resize:true,spaceId:s.id,sx,sz}; g.add(m); handleMeshes.push(m); }); }
}
function setPtr(e){ const r=canvas.getBoundingClientRect(); ptr.x=((e.clientX-r.left)/r.width)*2-1; ptr.y=-((e.clientY-r.top)/r.height)*2+1; }

function floorPlanePoint(){ const g=floorGroups.get(activeFloorId); const pl=new THREE.Plane(new THREE.Vector3(0,1,0),-(g?g.position.y:0));
  const p=new THREE.Vector3(); return ray.ray.intersectPlane(pl,p)?[Math.round((p.x-(g?g.position.x:0))*10)/10,Math.round((p.z-(g?g.position.z:0))*10)/10]:null; }
canvas.addEventListener('pointerdown',e=>{
  if(e.button!==0) return; setPtr(e); ray.setFromCamera(ptr,camera);
  if(drawing){ let pt=floorPlanePoint(); if(pt){ pt=snapSinglePoint(getFloor(activeFloorId),pt[0],pt[1]); drawPts.push(pt); updateDrawHelper(); } return; }
  if(eraseMode){ const hit=ray.intersectObjects([...pathMeshes.values()],false);
    if(hit.length){ const m=hit[0].object; const f=getFloor(m.userData.floorId); if(f){ pushUndo(); f.paths=f.paths.filter(p=>p.id!==m.userData.pathId); persist(); rebuildScene(); } } return; }
  if(pathMode){ const pt=floorPlanePoint(); if(pt){ curPath={id:uid(),kind:pathKind,color:pathColor,width:pathWidth,pts:[pt]}; pathCapturing=true; controls.enabled=false; updatePathPreview(); } return; }
  const hh=ray.intersectObjects(handleMeshes,false);   // 크기조절 핸들 우선
  if(hh.length){ startResize(hh[0].object); return; }
  const hits=ray.intersectObjects([...spaceMeshes.values()],false);
  if(hits.length){
    const m=hits[0].object; selectSpace(m.userData.spaceId);
    const g=floorGroups.get(m.userData.floorId);
    dragPlane.setFromNormalAndCoplanarPoint(new THREE.Vector3(0,1,0),new THREE.Vector3(0,g.position.y,0));
    ray.ray.intersectPlane(dragPlane,dragStart); meshStart.copy(m.position);
    dragging={mesh:m,space:getSpace(m.userData.spaceId),floor:getFloor(m.userData.floorId)}; controls.enabled=false;
  } else {
    const slabHit=ray.intersectObjects(worldRoot.children.map(g=>g.children[0]),false);

function startResize(m){ const u=m.userData; const s=getSpace(u.spaceId); const f=spaceFloor(u.spaceId); if(!s||!f) return;
  selectSpace(u.spaceId); const mesh=spaceMeshes.get(s.id); controls.enabled=false;
  if(u.poly){ const c=polyCentroid(s.points); const sd=Math.hypot(m.position.x-c[0],m.position.z-c[1])||1;
    resizing={type:'poly',s,f,mesh,c,orig:s.points.map(p=>p.slice()),startDist:sd,fac:1}; }
  else { const fx=s.x-u.sx*s.w/2, fz=s.z-u.sz*s.d/2;
    resizing={type:'box',s,f,mesh,fx,fz,origW:s.w,origD:s.d,w:s.w,d:s.d,cx:s.x,cz:s.z}; }
}
canvas.addEventListener('pointermove',e=>{
  if(resizing){ setPtr(e); ray.setFromCamera(ptr,camera); let p=floorPlanePoint(); if(!p) return;
    if(snapOn){ p=snapSinglePoint(resizing.f,p[0],p[1]); }
    if(resizing.type==='box'){ const w=Math.max(1,Math.abs(p[0]-resizing.fx)), d=Math.max(1,Math.abs(p[1]-resizing.fz));
      const cx=(p[0]+resizing.fx)/2, cz=(p[1]+resizing.fz)/2;
      resizing.mesh.scale.set(w/resizing.origW,1,d/resizing.origD); resizing.mesh.position.x=cx; resizing.mesh.position.z=cz;
      resizing.w=w; resizing.d=d; resizing.cx=cx; resizing.cz=cz; }
    else { const c=resizing.c; const fac=Math.max(0.2,Math.hypot(p[0]-c[0],p[1]-c[1])/resizing.startDist);
      resizing.mesh.scale.set(fac,1,fac); resizing.mesh.position.set(c[0]*(1-fac),0,c[1]*(1-fac)); resizing.fac=fac; }
    return; }
  if(pathCapturing){ setPtr(e); ray.setFromCamera(ptr,camera); const pt=floorPlanePoint();
    if(pt){ const last=curPath.pts[curPath.pts.length-1]; if(Math.hypot(pt[0]-last[0],pt[1]-last[1])>0.8){ curPath.pts.push(pt); updatePathPreview(); } } return; }
  if(!dragging) return; setPtr(e); ray.setFromCamera(ptr,camera);
  const p=new THREE.Vector3(); if(!ray.ray.intersectPlane(dragPlane,p)) return;
  let nx=meshStart.x+(p.x-dragStart.x), nz=meshStart.z+(p.z-dragStart.z);
  const s=dragging.space, f=dragging.floor;   // 스냅: 이동 위치 기준 도형 모서리를 실선/모서리에 붙임
  let snapPts;
  if(s.shape==='poly'){ snapPts=s.points.map(pt=>[pt[0]+nx,pt[1]+nz]); const c=polyCentroid(s.points); snapPts.push([c[0]+nx,c[1]+nz]); }
  else { snapPts=[[nx,nz],[nx-s.w/2,nz-s.d/2],[nx+s.w/2,nz-s.d/2],[nx+s.w/2,nz+s.d/2],[nx-s.w/2,nz+s.d/2]]; }

});
function updatePathPreview(){ drawHelper.clear(); if(!curPath)return; const g=floorGroups.get(activeFloorId); const oy=g?g.position.y:0, ox=g?g.position.x:0, oz=g?g.position.z:0;

window.addEventListener('pointerup',()=>{
  if(resizing){ controls.enabled=true; pushUndo(); const s=resizing.s;
    if(resizing.type==='box'){ s.w=Math.round(resizing.w*100)/100; s.d=Math.round(resizing.d*100)/100; s.x=Math.round(resizing.cx*100)/100; s.z=Math.round(resizing.cz*100)/100; }
    else { const fac=resizing.fac||1, c=resizing.c; s.points=resizing.orig.map(p=>[Math.round((c[0]+fac*(p[0]-c[0]))*100)/100, Math.round((c[1]+fac*(p[1]-c[1]))*100)/100]); }

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

/* ---------- 스냅(실선/모서리에 자동으로 붙이기) ---------- */
let snapOn=true; const SNAP_D=1.3;   // 스냅 거리(m)
function nearestOnSeg(px,pz,s){ const ax=s[0],az=s[1],bx=s[2],bz=s[3]; const dx=bx-ax,dz=bz-az; const L=dx*dx+dz*dz||1e-9;
  let t=((px-ax)*dx+(pz-az)*dz)/L; t=Math.max(0,Math.min(1,t)); return [ax+t*dx, az+t*dz]; }
function cornersOf(s){ if(s.shape==='poly') return s.points; return [[s.x-s.w/2,s.z-s.d/2],[s.x+s.w/2,s.z-s.d/2],[s.x+s.w/2,s.z+s.d/2],[s.x-s.w/2,s.z+s.d/2]]; }
/* 이동 중인 도형의 스냅점(pts) 배열을 받아, 도면 실선/다른 공간 모서리로 붙일 이동량 계산 */
function snapTranslation(f, pts){ if(!snapOn||!f) return null;
  let best=null; const con=(px,pz,tx,tz)=>{ const d=Math.hypot(tx-px,tz-pz); if(d<=SNAP_D&&(!best||d<best.d)) best={d,dx:tx-px,dz:tz-pz,target:[tx,tz]}; };
  const gv=f.guideVerts||[], gs=f.guideSegs||[]; const doSeg=gs.length&&gs.length<=3000;
  for(const p of pts){
    for(let i=0;i<gv.length;i++) con(p[0],p[1],gv[i][0],gv[i][1]);              // 도면 꼭짓점(실선 교차점)
    if(doSeg) for(let i=0;i<gs.length;i++){ const q=nearestOnSeg(p[0],p[1],gs[i]); con(p[0],p[1],q[0],q[1]); } // 실선 위 최근접
    for(const os of f.spaces){ if(os.id===selectedId) continue; const cs=cornersOf(os); for(const c of cs) con(p[0],p[1],c[0],c[1]); } // 다른 공간 모서리
  }
  return best;
}
function snapSinglePoint(f,x,z){ const s=snapTranslation(f,[[x,z]]); return s?[Math.round((x+s.dx)*100)/100,Math.round((z+s.dz)*100)/100]:[x,z]; }
function showSnapMarker(f,target){ if(!snapMarkerActive) return; const g=floorGroups.get(f.id); if(!g)return;
  drawHelper.clear(); const m=new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12),new THREE.MeshBasicMaterial({color:0x39d98a}));
  m.position.set(target[0]+g.position.x, g.position.y+0.4, target[1]+g.position.z); drawHelper.add(m); }
let snapMarkerActive=false;
function toggleSnap(){ snapOn=!snapOn; document.getElementById('btnSnap').classList.toggle('on',snapOn); }

/* ---------- 데이터 헬퍼 ---------- */
function getFloor(id){ return project.floors.find(f=>f.id===id); }
function getSpace(id){ for(const f of project.floors){ const s=f.spaces.find(x=>x.id===id); if(s) return s; } return null; }
function spaceFloor(id){ return project.floors.find(f=>f.spaces.some(s=>s.id===id)); }

/* ---------- 액션 ---------- */
function addFloor(){ pushUndo(); focusFloorId=null; const mx=project.floors.reduce((m,f)=>Math.max(m,f.level),0); const f=makeFloor(mx+1); project.floors.push(f); activeFloorId=f.id; persist(); rebuildScene(); renderAll(); }
function addSpace(){ const f=getFloor(activeFloorId)||project.floors[0]; if(!f){addFloor();return addSpace();} pushUndo(); activeFloorId=f.id;
  const s={id:uid(),name:'새 공간',category:CAT_KEYS[0],shape:'box',x:0,z:0,w:6,d:5,h:3,memo:''}; f.spaces.push(s); selectedId=s.id; persist(); rebuildScene(); renderAll(); }
function deleteSpace(){ const f=spaceFloor(selectedId); if(!f)return; pushUndo(); f.spaces=f.spaces.filter(s=>s.id!==selectedId); selectedId=null; persist(); rebuildScene(); renderAll(); }
function deleteFloor(id){ if(project.floors.length<=1){alert('최소 1개 층은 필요합니다.');return;} if(!confirm('이 층과 포함 공간을 모두 삭제할까요?'))return;
  pushUndo(); project.floors=project.floors.filter(f=>f.id!==id); if(activeFloorId===id)activeFloorId=project.floors[0].id; if(focusFloorId===id)focusFloorId=null; persist(); rebuildScene(); renderAll(); }
/* 층 순서 재배치: 위에서 아래 순서(newTopToBottom)대로 level 재부여 */
function reorderFloors(newTopToBottomIds){ pushUndo();
  const n=newTopToBottomIds.length;
  newTopToBottomIds.forEach((id,i)=>{ const f=getFloor(id); if(f) f.level=n-i; }); // 맨 위 = 가장 큰 level
  persist(); rebuildScene(); renderAll(); }
/* 층 수평 이동(펼쳐보기) */
function nudgeFloor(id,dx,dz){ const f=getFloor(id); if(!f)return; pushUndo(); f.ox=(f.ox||0)+dx; f.oz=(f.oz||0)+dz; persist(); rebuildScene(); renderAll(); }
function resetFloorOffset(id){ const f=getFloor(id); if(!f)return; pushUndo(); f.ox=0; f.oz=0; persist(); rebuildScene(); renderAll(); }
function toggleSpread(){ pushUndo(); project.spread=!project.spread;
  if(project.spread){ // 바닥에 바둑판식 자동 배치
    const sorted=[...project.floors].sort((a,b)=>b.level-a.level);
    const cols=Math.ceil(Math.sqrt(sorted.length));
    const cw=Math.max(...project.floors.map(f=>f.w))+8, cd=Math.max(...project.floors.map(f=>f.d))+8;
    sorted.forEach((f,i)=>{ const r=Math.floor(i/cols), c=i%cols; f.ox=(c-(cols-1)/2)*cw; f.oz=(r)*cd; });
  } else { project.floors.forEach(f=>{ f.ox=0; f.oz=0; }); }
  focusFloorId=null; persist(); rebuildScene(); renderAll();
  flyTo(new THREE.Vector3(project.spread?0:48, project.spread?90:46, project.spread?90:58), new THREE.Vector3(0,project.spread?0:6,0)); }
function selectSpace(id){ selectedId=id; if(id)activeFloorId=spaceFloor(id).id; rebuildScene(); renderAll(); }
/* 선택 공간을 다른 층으로 이동 */
function moveSpaceToFloor(spaceId,targetFloorId){ const src=spaceFloor(spaceId), tgt=getFloor(targetFloorId);
  if(!src||!tgt||src.id===tgt.id) return; pushUndo();
  const s=src.spaces.find(x=>x.id===spaceId); src.spaces=src.spaces.filter(x=>x.id!==spaceId); tgt.spaces.push(s);
  activeFloorId=tgt.id; selectedId=spaceId; persist(); rebuildScene(); renderAll(); }
function focusFloor(id){ const f=getFloor(id); if(!f)return; focusFloorId=id; activeFloorId=id; selectedId=null;
  rebuildScene(); renderAll();
  const r=Math.max(f.w,f.d); flyTo(new THREE.Vector3(0,FOCUS_Y+r*0.95,r*0.85+8), new THREE.Vector3(0,FOCUS_Y,0)); }
function exitFocus(){ focusFloorId=null; rebuildScene(); renderAll();
  flyTo(new THREE.Vector3(48,46,58), new THREE.Vector3(0,6,0)); }
function snapshot(){ const note=prompt('이번 작업 내용을 한 줄로 기록 (예: 3층 검사실→2층 이설, 병동 확장)'); if(note===null)return;
  project.history.unshift({id:uid(),note:note||'작업 저장',at:Date.now(),state:JSON.stringify(project.floors)}); persist(); renderHistory(); }
function restoreSnapshot(hid){ const h=project.history.find(x=>x.id===hid); if(!h)return;
  if(!confirm('이 시점 상태로 되돌립니다.\n('+h.note+')'))return; project.floors=JSON.parse(h.state); activeFloorId=project.floors[0]?.id; selectedId=null; persist(); rebuildScene(); renderAll(); }
function setBaseline(){ project.baseline={at:Date.now(),floors:JSON.parse(JSON.stringify(project.floors))};
  persist(); alert('현재 배치를 "기준안(Before)"으로 지정했습니다.\n이후 변경분은 [면적 증감표]에서 자동 비교됩니다.'); }

/* ---------- PDF ---------- */
/* 업로드 도면을 얹을 층 결정: 빈 층(도면·공간 없음)이면 재사용, 아니면 새 층 생성 → 파일마다 층 분리 */
function floorForUpload(name){
  let f=getFloor(activeFloorId);
  if(!f || f.pdf || (f.spaces&&f.spaces.length)){ const mx=project.floors.reduce((m,x)=>Math.max(m,x.level),0); f=makeFloor(mx+1); project.floors.push(f); }
  if(name) f.name=name;
  activeFloorId=f.id; return f;
}
document.getElementById('pdfInput').addEventListener('change',async e=>{
  const files=[...e.target.files]; e.target.value=''; if(!files.length)return; pushUndo();
  for(const file of files){
    const f=floorForUpload(file.name.replace(/\.[^.]+$/,''));
    try{ const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:buf}).promise; const page=await pdf.getPage(1);
      const vp=page.getViewport({scale:2}); const cv=document.createElement('canvas'); cv.width=vp.width; cv.height=vp.height;
      await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise; f.pdf=cv.toDataURL('image/png');
      const ratio=vp.width/vp.height; f.d=30; f.w=Math.round(30*ratio*10)/10;
    }catch(err){ alert(file.name+' 처리 실패: '+err.message); }
  }
  persist(); rebuildScene(); renderAll();
  alert(files.length+'개 PDF 도면을 '+(files.length>1?'각각 새 층으로 나눠 ':'')+'추가했습니다.\n좌측 층 목록에서 파일명으로 층이 구분됩니다.\n우측 [층 실치수]에서 실제 가로/세로(m)를 맞춘 뒤 실을 그리세요.');
});

/* ---------- 관련 법령 링크 (국가법령정보센터) ---------- */
const LAWS=[
  ['의료법','https://www.law.go.kr/법령/의료법'],
  ['의료법 시행규칙 (별표4 의료기관 시설규격)','https://www.law.go.kr/법령/의료법시행규칙'],

  ['건축물의 피난·방화구조 등의 기준에 관한 규칙','https://www.law.go.kr/법령/건축물의피난·방화구조등의기준에관한규칙'],
  ['건축물의 설비기준 등에 관한 규칙','https://www.law.go.kr/법령/건축물의설비기준등에관한규칙'],
  ['소방시설 설치 및 관리에 관한 법률','https://www.law.go.kr/법령/소방시설설치및관리에관한법률'],
  ['화재의 예방 및 안전관리에 관한 법률','https://www.law.go.kr/법령/화재의예방및안전관리에관한법률'],
  ['응급의료에 관한 법률','https://www.law.go.kr/법령/응급의료에관한법률'],

];
function lawSectionHTML(){ return '<div class="sec"><h3>관련 법령 바로가기 🔗</h3>'+
  LAWS.map(l=>'<a class="lawlink" href="'+encodeURI(l[1])+'" target="_blank" rel="noopener">🔗 '+l[0]+'</a>').join('')+
  '<div class="badge" style="margin-top:6px;">클릭 시 국가법령정보센터(law.go.kr)로 연결</div></div>'; }
function renderChecks(f,s){ const items=[];
  if(s && s.category==='병동·병실'){ const area=spaceArea(s), cap=Math.floor(area/6.3);
    items.push(chk(area>=6.3,'입원실 바닥면적','현재 '+area.toFixed(1)+'㎡ → 2인이상 1인당 6.3㎡ 적용 시 최대 '+cap+'병상. (1인실 10㎡ 이상) *의료법 시행규칙 별표4')); }
  if(f){ const used=f.spaces.reduce((a,x)=>a+spaceArea(x),0), gross=f.w*f.d, r=gross?(gross-used)/gross:0;
    items.push(chk(r>=0.30,'공용·복도 확보율',(100*r).toFixed(0)+'% 확보. 병원 복도 유효폭 1.5m(양옆 거실 2.1m) 이상 및 피난동선 확보. *건축물방화구조규칙')); }
  if(s && (s.category==='수술·시술'||s.category==='중환자실')) items.push(chk(true,'특수구역 설비','수술실·중환자실은 별도 공조(양압/음압)·의료가스·비상전원(자가발전) 계통 검토. 이설 시 전기·기계 인프라 동반 확인.'));
  if(s && s.category==='응급') items.push(chk(true,'응급실 접근·피난','구급차 진입동선·별도 출입구·이송동선 확보. *응급의료법 시설기준'));
  items.push(chk(true,'병상 증설 시 심의','병상 신·증설은 시·도 사전심의→본심의(복지부 병상수급 기본시책) 대상일 수 있음. 총 병상수 변동 시 절차 확인.'));
  return items.join(''); }
function chk(p,h,n){ return '<div class="chk '+(p?'pass':'warn')+'"><div class="h">'+(p?'✔ ':'⚠ ')+h+'</div><div class="n">'+n+'</div></div>'; }
function bindRight(f,s){ const on=(id,ev,fn)=>{const e=document.getElementById(id);if(e)e.addEventListener(ev,fn);};
  if(f){ on('fW','change',e=>{f.w=+e.target.value||f.w;persist();rebuildScene();renderRight();});
    on('fD','change',e=>{f.d=+e.target.value||f.d;persist();rebuildScene();renderRight();});
    on('fName','change',e=>{f.name=e.target.value;persist();renderFloorRows();}); }
  if(s){ on('sName','input',e=>{s.name=e.target.value;persist();});
    on('sCat','change',e=>{s.category=e.target.value;persist();rebuildScene();renderRight();});
    ['sW','sD','sH'].forEach(id=>on(id,'change',e=>{const v=+e.target.value;if(id==='sW')s.w=v;if(id==='sD')s.d=v;if(id==='sH')s.h=v;persist();rebuildScene();renderRight();}));
    on('sFloor','change',e=>moveSpaceToFloor(s.id,e.target.value));
    on('sMemo','input',e=>{s.memo=e.target.value.slice(0,100);document.getElementById('memoCount').textContent=s.memo.length+' / 100';persist();});
    on('btnDel','click',deleteSpace); } }

function deltaTableHTML(before,after,title){
  const b=catTotals(before), a=catTotals(after); const keys=[...new Set([...Object.keys(b),...Object.keys(a)])].sort((x,y)=>CAT_KEYS.indexOf(x)-CAT_KEYS.indexOf(y));
  let rows=keys.map(k=>{ const bv=b[k]||0, av=a[k]||0, d=av-bv;
    return '<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#'+(CATS[k]||0x888888).toString(16).padStart(6,'0')+';margin-right:6px;"></span>'+k+'</td><td>'+bv.toFixed(1)+'</td><td>'+av.toFixed(1)+'</td><td class="'+(d>0.05?'up':d<-0.05?'down':'')+'">'+(d>0?'+':'')+d.toFixed(1)+'</td></tr>';
  }).join('');
  const tb=totalArea(before), ta=totalArea(after), td=ta-tb;
  return '<table class="at"><thead><tr><th>'+(title||'용도')+'</th><th>기준안 Before(㎡)</th><th>현재안 After(㎡)</th><th>증감 Δ(㎡)</th></tr></thead><tbody>'+rows+
    '</tbody><tfoot><tr><td>총 실면적</td><td>'+tb.toFixed(1)+'</td><td>'+ta.toFixed(1)+'</td><td class="'+(td>0.05?'up':td<-0.05?'down':'')+'">'+(td>0?'+':'')+td.toFixed(1)+'</td></tr></tfoot></table>';
}

  let added=0;
  for(const file of files){

    let text; try{ text=await file.text(); }catch(err){ alert(file.name+' 읽기 실패'); continue; }
    let ents; try{ ents=parseDXF(text); }catch(err){ alert(file.name+' DXF 파싱 실패: '+err.message); continue; }

});
function parseDXF(text){
  const L=text.split(/\r\n|\r|\n/); const P=[];
  for(let i=0;i+1<L.length;i+=2){ const c=L[i].trim(); if(c==='')continue; P.push([parseInt(c,10),L[i+1]]); }
  const ents=[]; let cur=null; const flush=()=>{ if(cur)ents.push(cur); cur=null; };
  for(const [code,valRaw] of P){ const val=(valRaw==null?'':valRaw).trim();
    if(code===0){ flush(); cur={type:val,pts:[],text:''}; continue; }
    if(!cur)continue; const num=parseFloat(val);
    switch(code){
      case 10: cur.pts.push([num,0]); break;
      case 20: if(cur.pts.length) cur.pts[cur.pts.length-1][1]=num; break;
      case 11: cur.p2=[num,0]; break;
      case 21: if(cur.p2) cur.p2[1]=num; break;
      case 40: if(cur.r==null) cur.r=num; break;
      case 70: cur.flag=parseInt(val,10)||0; break;
      case 1: cur.text=val; break;
      case 8: cur.layer=val; break;
    }
  }
  flush(); return ents;
}
function stitch(ents){ const out=[]; let poly=null;
  for(const en of ents){
    if(en.type==='POLYLINE'){ poly={type:'LWPOLYLINE',pts:[],flag:en.flag||0,layer:en.layer}; out.push(poly); continue; }
    if(en.type==='VERTEX'){ if(poly&&en.pts[0]) poly.pts.push(en.pts[0]); continue; }
    if(en.type==='SEQEND'){ poly=null; continue; }
    poly=null; out.push(en);
  } return out;
}
function bboxOf(ents){ let a=1e18,b=1e18,c=-1e18,d=-1e18; const u=(x,y)=>{ if(!isFinite(x)||!isFinite(y))return; a=Math.min(a,x);b=Math.min(b,y);c=Math.max(c,x);d=Math.max(d,y); };
  ents.forEach(en=>{ en.pts.forEach(p=>u(p[0],p[1])); if(en.p2)u(en.p2[0],en.p2[1]); if(en.type==='CIRCLE'&&en.r&&en.pts[0]){u(en.pts[0][0]-en.r,en.pts[0][1]-en.r);u(en.pts[0][0]+en.r,en.pts[0][1]+en.r);} });
  return {minx:a,miny:b,maxx:c,maxy:d}; }
function renderDXF(ents,bb){ const W=1600,H=Math.max(200,Math.round(1600*(bb.maxy-bb.miny)/((bb.maxx-bb.minx)||1)));
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H; const x=cv.getContext('2d');
  x.fillStyle='#fff'; x.fillRect(0,0,W,H);
  const sx=W/((bb.maxx-bb.minx)||1), sy=H/((bb.maxy-bb.miny)||1), TX=X=>(X-bb.minx)*sx, TY=Y=>H-(Y-bb.miny)*sy;
  x.strokeStyle='#333'; x.lineWidth=1; x.fillStyle='#222'; x.font='12px sans-serif';
  ents.forEach(en=>{
    if(en.type==='LINE'&&en.pts[0]&&en.p2){ x.beginPath(); x.moveTo(TX(en.pts[0][0]),TY(en.pts[0][1])); x.lineTo(TX(en.p2[0]),TY(en.p2[1])); x.stroke(); }
    else if(en.type==='LWPOLYLINE'&&en.pts.length>1){ x.beginPath(); en.pts.forEach((p,i)=> i?x.lineTo(TX(p[0]),TY(p[1])):x.moveTo(TX(p[0]),TY(p[1]))); if(en.flag&1)x.closePath(); x.stroke(); }
    else if(en.type==='CIRCLE'&&en.r&&en.pts[0]){ x.beginPath(); x.arc(TX(en.pts[0][0]),TY(en.pts[0][1]),en.r*sx,0,7); x.stroke(); }
    else if((en.type==='TEXT'||en.type==='MTEXT')&&en.text&&en.pts[0]){ x.fillText(en.text.replace(/\\[A-Za-z0-9.|{}]+;?/g,'').slice(0,20),TX(en.pts[0][0]),TY(en.pts[0][1])); }
  });
  return cv.toDataURL('image/png');
}
function pointInPoly(px,pz,poly){ let c=false; for(let i=0,j=poly.length-1;i<poly.length;j=i++){ const xi=poly[i][0],zi=poly[i][1],xj=poly[j][0],zj=poly[j][1];
  if(((zi>pz)!=(zj>pz)) && (px<(xj-xi)*(pz-zi)/((zj-zi)||1e-9)+xi)) c=!c; } return c; }
/* 실선(선분) 네트워크에서 최소 면(face)들을 추출 → 각 방(실) 경계.
   각 노드에서 들어온 반대방향의 '시계방향 다음 간선'을 따라가며 평면 그래프의 면을 추적(공유 벽으로 나뉜 방도 분리). */
/* T자 접합 처리: 다른 선분의 끝점이 어떤 선분 '중간'에 닿으면 그 지점에서 쪼갬 */
function planarize(segs){
  const eps=0.06, seen=new Set(), pts=[];
  segs.forEach(s=>[[s[0],s[1]],[s[2],s[3]]].forEach(p=>{ const k=Math.round(p[0]*20)/20+','+Math.round(p[1]*20)/20; if(!seen.has(k)){seen.add(k);pts.push(p);} }));
  const out=[];
  segs.forEach(s=>{ const ax=s[0],az=s[1],bx=s[2],bz=s[3], dx=bx-ax,dz=bz-az, L2=dx*dx+dz*dz||1e-9, L=Math.sqrt(L2);
    const ts=[0,1];
    pts.forEach(p=>{ const t=((p[0]-ax)*dx+(p[1]-az)*dz)/L2; if(t>eps/L&&t<1-eps/L){ const px=ax+t*dx,pz=az+t*dz; if(Math.hypot(p[0]-px,p[1]-pz)<eps) ts.push(t); } });
    ts.sort((a,b)=>a-b);
    for(let i=0;i+1<ts.length;i++){ if(ts[i+1]-ts[i]<1e-4) continue; out.push([ax+ts[i]*dx,az+ts[i]*dz, ax+ts[i+1]*dx,az+ts[i+1]*dz]); }
  });
  return out;
}
function stitchLoops(segs){
  segs=planarize(segs);
  const K=(x,z)=>Math.round(x*20)/20+','+Math.round(z*20)/20;   // 5cm 격자로 끝점 결합
  const pos=new Map(), adj=new Map();
  const add=(k,x,z)=>{ if(!pos.has(k)){ pos.set(k,[x,z]); adj.set(k,[]); } };
  segs.forEach(s=>{ const ka=K(s[0],s[1]), kb=K(s[2],s[3]); if(ka===kb) return; add(ka,s[0],s[1]); add(kb,s[2],s[3]);
    const A=pos.get(ka), B=pos.get(kb);
    if(!adj.get(ka).some(e=>e.k===kb)) adj.get(ka).push({k:kb,ang:Math.atan2(B[1]-A[1],B[0]-A[0])});
    if(!adj.get(kb).some(e=>e.k===ka)) adj.get(kb).push({k:ka,ang:Math.atan2(A[1]-B[1],A[0]-B[0])}); });
  adj.forEach(l=>l.sort((a,b)=>a.ang-b.ang));
  const used=new Set(), loops=[], dkey=(a,b)=>a+'>'+b;
  adj.forEach((list,u)=>{ list.forEach(e0=>{
    if(used.has(dkey(u,e0.k))) return;
    const poly=[]; let cu=u, cv=e0.k, guard=0;
    while(guard++<8000){ used.add(dkey(cu,cv)); poly.push(pos.get(cu));
      const nb=adj.get(cv); let idx=nb.findIndex(x=>x.k===cu); if(idx<0) break;
      const nx=nb[(idx-1+nb.length)%nb.length]; cu=cv; cv=nx.k;
      if(cu===u&&cv===e0.k) break; }
    if(poly.length>=3) loops.push(poly.map(p=>[p[0],p[1]]));
  }); });
  return loops;
}
/* 스냅용 가이드(실선 꼭짓점·선분)를 층에 저장 */
function buildGuides(ents,cx,cy,scale,f){
  const T=p=>[(p[0]-cx)*scale,-((p[1]-cy)*scale)];
  const segs=[], vset=new Map();
  const addV=(x,z)=>{ const k=Math.round(x*100)+','+Math.round(z*100); if(!vset.has(k)) vset.set(k,[Math.round(x*100)/100,Math.round(z*100)/100]); };
  const addSeg=(a,b)=>{ segs.push([a[0],a[1],b[0],b[1]]); addV(a[0],a[1]); addV(b[0],b[1]); };
  ents.forEach(en=>{
    if(en.type==='LINE'&&en.pts[0]&&en.p2){ addSeg(T(en.pts[0]),T(en.p2)); }
    else if(en.type==='LWPOLYLINE'&&en.pts.length>1){ const P=en.pts.map(T); for(let i=0;i+1<P.length;i++) addSeg(P[i],P[i+1]); if((en.flag&1)&&P.length>2) addSeg(P[P.length-1],P[0]); }
  });
  f.guideSegs=segs.slice(0,6000);
  f.guideVerts=[...vset.values()].slice(0,5000);
}
function recognizeSpaces(ents,cx,cy,scale,f){
  const T=p=>[(p[0]-cx)*scale,-((p[1]-cy)*scale)];
  const cands=[];
  ents.filter(en=>en.type==='LWPOLYLINE'&&(en.flag&1)&&en.pts.length>=3).forEach(rm=>cands.push(rm.pts.map(T))); // 닫힌 폴리라인
  const segs=[];   // 선분 → 루프
  ents.forEach(en=>{ if(en.type==='LINE'&&en.pts[0]&&en.p2){ const a=T(en.pts[0]),b=T(en.p2); segs.push([a[0],a[1],b[0],b[1]]); }
    else if(en.type==='LWPOLYLINE'&&!(en.flag&1)&&en.pts.length>1){ const P=en.pts.map(T); for(let i=0;i+1<P.length;i++) segs.push([P[i][0],P[i][1],P[i+1][0],P[i+1][1]]); } });
  stitchLoops(segs).forEach(poly=>{ if(poly.length>=3) cands.push(poly); });
  const texts=ents.filter(en=>(en.type==='TEXT'||en.type==='MTEXT')&&en.text&&en.pts[0])
    .map(t=>({x:(t.pts[0][0]-cx)*scale,z:-((t.pts[0][1]-cy)*scale),s:t.text.replace(/\\[A-Za-z0-9.|{}]+;?/g,'').trim()})).filter(t=>t.s);
  const floorArea=f.w*f.d;
  // 후보 정리: 면적 필터 + 중심 계산
  let cand2=cands.map(pts=>({pts,area:polyArea(pts),c:polyCentroid(pts)})).filter(o=>o.area>=3&&o.area<=floorArea*1.05);
  // 다른(더 작은) 실을 감싸는 외곽 경계선은 제외
  cand2=cand2.filter(o=> !cand2.some(u=> u!==o && u.area<o.area*0.98 && pointInPoly(u.c[0],u.c[1],o.pts)));
  let count=0; const placed=[];
  cand2.sort((a,b)=>a.area-b.area).forEach(({pts,area,c})=>{
    if(placed.some(pc=>Math.hypot(pc[0]-c[0],pc[1]-c[1])<1.0)) return;   // 중복 제거
    let name='';
    for(const t of texts){ if(pointInPoly(t.x,t.z,pts)){ name=t.s; break; } }
    if(!name){ let best=1e9; for(const t of texts){ const dd=Math.hypot(t.x-c[0],t.z-c[1]); if(dd<best){best=dd;name=t.s;} } if(best>Math.sqrt(area)) name=''; }
    if(!name) name='실'+(count+1);
    f.spaces.push({id:uid(),name,category:categorizeName(name),shape:'poly',points:pts,h:3,memo:'',auto:true}); placed.push(c); count++;
  });
  return count;
}
function applyDXF(rawEnts, targetFloor, quiet){
  const ents=stitch(rawEnts); const bb=bboxOf(ents); const wD=bb.maxx-bb.minx, hD=bb.maxy-bb.miny;
  if(!(wD>0&&hD>0)){ alert('도면 좌표를 찾지 못했습니다. (LINE/POLYLINE 엔티티가 있는 DXF인지 확인)'); return false; }
  const maxDim=Math.max(wD,hD); const guess=maxDim>1000?'mm':(maxDim>150?'cm':'m');
  let unit=prompt((targetFloor?'['+targetFloor.name+'] ':'')+'도면 단위를 확인하세요 (mm / cm / m)\n도면 최대 치수 ≈ '+Math.round(maxDim)+' 도면단위',guess);
  if(unit===null) return false; unit=unit.trim().toLowerCase(); const scale=unit==='mm'?0.001:unit==='cm'?0.01:1;
  const cx=(bb.minx+bb.maxx)/2, cy=(bb.miny+bb.maxy)/2;
  const f=targetFloor||getFloor(activeFloorId)||project.floors[0]; activeFloorId=f.id; pushUndo();
  f.w=Math.round(wD*scale*10)/10; f.d=Math.round(hD*scale*10)/10; f.pdf=renderDXF(ents,bb);
  buildGuides(ents,cx,cy,scale,f);                 // 스냅용 실선 가이드
  const found=recognizeSpaces(ents,cx,cy,scale,f); // 닫힌 실선 → 3D 자동 생성
  persist(); rebuildScene(); renderAll();
  addMsg('sys','📐 DXF 도면을 '+f.name+'에 적용했습니다.\n· 도면 크기: '+f.w+'m × '+f.d+'m (단위 '+unit+')\n· 실선 윤곽으로 자동 생성된 3D 실: '+found+'개\n· 스냅 꼭짓점 '+((f.guideVerts||[]).length)+'개 (도형을 실선 근처로 옮기면 자동으로 붙습니다)\n좌측 [🗂 공간분류] 탭에서 확인하세요.');
  if(!quiet) alert('✅ DXF 적용 완료\n크기 '+f.w+'×'+f.d+'m · 실선 윤곽 자동 3D 실 '+found+'개\n\n· 도형을 실선 근처로 드래그하면 🧲스냅으로 자동으로 붙습니다.\n· [✏ 실 외곽선 그리기]도 클릭 시 실선 꼭짓점에 붙어 도면을 정확히 따라 그릴 수 있습니다.'+(found===0?'\n\n(자동 3D 0개: 실 경계가 닫힌 실선/폴리라인이 아니거나 단위가 다를 수 있습니다. 이 경우 그리기+스냅으로 따라 그리세요.)':''));
  return true;
}

/* ---------- 공간분류(카테고리) 트리 ---------- */
function renderCatTree(){ const el=document.getElementById('catTree'); if(!el)return; el.innerHTML='';
  const byCat={}; project.floors.forEach(f=>f.spaces.forEach(s=>{ (byCat[s.category]=byCat[s.category]||[]).push({s,f}); }));
  const total=Object.values(byCat).reduce((a,v)=>a+v.length,0);
  if(!total){ el.innerHTML='<div class="empty" style="padding:8px">아직 구획된 공간이 없습니다.<br><br>· DXF 도면을 올리면 실이 자동 인식·분류됩니다.<br>· 또는 공간을 추가하면 여기 카테고리별로 정리됩니다.</div>'; return; }
  const head=document.createElement('div'); head.style.cssText='font-size:11px;color:var(--muted);margin:2px 4px 8px;'; head.textContent='총 '+total+'실 · '+Object.keys(byCat).length+'개 카테고리'; el.append(head);
  CAT_KEYS.forEach(cat=>{ const list=byCat[cat]; if(!list||!list.length)return;
    const grp=document.createElement('div'); grp.className='catgrp';
    const ch=document.createElement('div'); ch.className='ch'; ch.style.opacity=hiddenCats.has(cat)?.45:1;
    const totA=list.reduce((a,o)=>a+spaceArea(o.s),0);
    ch.innerHTML='<span class="sw" style="background:#'+CATS[cat].toString(16).padStart(6,'0')+'"></span>'+cat+'<span class="cnt">'+list.length+'실·'+totA.toFixed(0)+'㎡</span>';
    ch.onclick=()=>{ hiddenCats.has(cat)?hiddenCats.delete(cat):hiddenCats.add(cat); rebuildScene(); renderLegend(); renderCatTree(); };
    grp.append(ch);
    list.forEach(o=>{ const it=document.createElement('div'); it.className='sitem'+(o.s.id===selectedId?' sel':'');
      it.innerHTML='<span>'+esc(o.s.name)+'</span><span style="color:var(--muted)">'+esc(o.f.name)+'·'+spaceArea(o.s).toFixed(0)+'㎡</span>';
      it.onclick=()=>{ activeFloorId=o.f.id; selectSpace(o.s.id); }; grp.append(it); });
    el.append(grp);
  });
}

/* ---------- 좌측 탭 ---------- */
function switchTab(t){ ['hist','cat','ai'].forEach(k=>{ const p=document.getElementById('pane'+cap(k)); if(p) p.style.display=(k===t)?(k==='ai'?'flex':'block'):'none';
  const b=document.getElementById('tab'+cap(k)); if(b) b.classList.toggle('active',k===t); }); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

/* ---------- 채팅 · AI 자동배치(규칙기반) ---------- */
function addMsg(role,text){ project.chat=project.chat||[]; project.chat.push({role,text,at:Date.now()}); persist(); renderChat(); }
function renderChat(){ const el=document.getElementById('chatLog'); if(!el)return; el.innerHTML='';
  const c=project.chat||[];
  if(!c.length){ el.innerHTML='<div class="msg sys">요구사항을 입력하면 배치안을 자동 생성합니다.\n예) "3층에 외래 진료실 6개, CT실 1개, 병실 30병상, 대기실 1개 배치"\n\n※ 오프라인 규칙기반 생성기입니다. 실 종류·개수·병상수를 인식해 새 층에 자동 배치합니다.</div>'; return; }
  c.forEach(m=>{ const d=document.createElement('div'); d.className='msg '+(m.role==='user'?'user':'sys'); d.textContent=m.text; el.append(d); });
  el.scrollTop=el.scrollHeight;
}
function sendChat(){ const inp=document.getElementById('chatInput'); const t=inp.value.trim(); if(!t)return; inp.value=''; addMsg('user',t); generateLayout(t); }
function generateLayout(text){
  let level=null; const lm=text.match(/(지하\s*)?(\d+)\s*층/); if(lm) level=(lm[1]?-1:1)*parseInt(lm[2],10);
  const body=text.replace(/(지하\s*)?\d+\s*층(에다가|에다|에게|에서|에|의)?/g,' ');   // 층 토큰 제거(개수 오인식 방지)
  const clauses=body.split(/[,\n·]|그리고|및|와 |과 /); const rooms=[];
  clauses.forEach(cl=>{ const rule=KW.find(r=>r[0].test(cl)); if(!rule)return;
    const num=cl.match(/(\d+)\s*(개|실|개소|병상|床|명|bed)?/i); let cnt=1, beds=0;
    if(num){ const n=parseInt(num[1],10); if(/병상|床|bed/i.test(num[2]||'')||/병상/.test(cl)) beds=n; else cnt=n; }
    if(rule[1]==='병동·병실'&&beds){ const per=6, nRoom=Math.max(1,Math.ceil(beds/per));
      for(let i=0;i<nRoom;i++) rooms.push({name:rule[4]+(i+1)+'('+Math.min(per,beds-i*per)+'인)',cat:rule[1],w:7,d:6}); }
    else for(let i=0;i<cnt;i++) rooms.push({name:rule[4]+(cnt>1?(i+1):''),cat:rule[1],w:rule[2],d:rule[3]});
  });
  if(!rooms.length){ addMsg('sys','인식된 실이 없습니다. 예: "외래 진료실 5개, CT 1개, 병실 20병상"처럼 실 종류와 개수를 적어주세요.'); return; }
  pushUndo(); let f;
  if(level!=null){ f=project.floors.find(x=>x.level===level); if(!f){ f=makeFloor(level); f.name=Math.abs(level)+'층'+(level<0?'(지하)':''); project.floors.push(f); } }
  else { const mx=project.floors.reduce((m,x)=>Math.max(m,x.level),0); f=makeFloor(mx+1); project.floors.push(f); }
  if(f.spaces.length){ const mx=project.floors.reduce((m,x)=>Math.max(m,x.level),0); const nf=makeFloor(mx+1); nf.name='AI배치안'; project.floors.push(nf); f=nf; }
  activeFloorId=f.id; focusFloorId=null; packRooms(f,rooms);
  persist(); rebuildScene(); renderAll();
  const byCat={}; rooms.forEach(r=>byCat[r.cat]=(byCat[r.cat]||0)+1);
  const summary=Object.entries(byCat).map(([k,v])=>k+' '+v+'실').join(', ');
  addMsg('sys','✅ '+f.name+'에 '+rooms.length+'개 실을 자동 배치했습니다.\n· '+summary+'\n· 총 실면적 '+rooms.reduce((a,r)=>a+r.w*r.d,0).toFixed(0)+'㎡ (복도·공용 제외)\n필요 시 드래그로 위치를 조정하고 [🚶동선]으로 환자·물류 흐름을 추가하세요.');
  project.history.unshift({id:uid(),note:'AI 자동배치: '+summary,at:Date.now(),state:JSON.stringify(project.floors)}); persist();
  flyTo(new THREE.Vector3(0,62,64),new THREE.Vector3(0,6,0));
}
function packRooms(f,rooms){ const margin=2; f.w=Math.max(f.w,44);
  let x=-f.w/2+margin, z=margin, rowH=0;
  rooms.forEach(r=>{ if(x+r.w>f.w/2-margin){ x=-f.w/2+margin; z+=rowH+margin; rowH=0; } x+=r.w+margin; rowH=Math.max(rowH,r.d); });
  f.d=Math.max(30,Math.round(z+rowH+margin));
  x=-f.w/2+margin; z=-f.d/2+margin; rowH=0;
  rooms.forEach(r=>{ if(x+r.w>f.w/2-margin){ x=-f.w/2+margin; z+=rowH+margin; rowH=0; }
    f.spaces.push({id:uid(),name:r.name,category:r.cat,shape:'box',x:Math.round((x+r.w/2)*10)/10,z:Math.round((z+r.d/2)*10)/10,w:r.w,d:r.d,h:3,memo:'',auto:true});
    x+=r.w+margin; rowH=Math.max(rowH,r.d); });
}

/* ---------- 동선 툴바 · 제목 ---------- */
const PATH_COLORS=[0xff3b3b,0x3b7bff,0x39d98a,0xf5b642,0xb06bff,0xffffff];
function initPathBar(){ const el=document.getElementById('pathColors'); el.innerHTML='';
  PATH_COLORS.forEach(c=>{ const sw=document.createElement('span'); sw.className='sw'+(c===pathColor?' sel':''); sw.style.background='#'+c.toString(16).padStart(6,'0');
    sw.onclick=()=>{ pathColor=c; [...el.children].forEach(ch=>ch.classList.remove('sel')); sw.classList.add('sel'); }; el.append(sw); });
  document.getElementById('pathKind').onchange=e=>pathKind=e.target.value;
  const wr=document.getElementById('pathWidth'); wr.oninput=e=>{ pathWidth=+e.target.value; document.getElementById('pathWval').textContent=e.target.value; };
  document.getElementById('pathDone').onclick=()=>clearModes();
}
function syncTitle(){ const inp=document.getElementById('sceneTitle'); if(inp&&document.activeElement!==inp) inp.value=project.title||''; }

/* ---------- 부팅 ---------- */
function boot(){
  project=db.projects.find(p=>p.id===db.activeId)||db.projects[0]; if(!project) project=newProject('상급종합병원 배치안 1');
  db.activeId=project.id; activeFloorId=project.floors[0]?.id; selectedId=null; focusFloorId=null; hiddenCats.clear();
  if(project.floorGap==null) project.floorGap=FLOOR_H;
  if(project.spread==null) project.spread=false;
  if(project.title==null) project.title='';
  if(!project.chat) project.chat=[];
  if(project.showLabels==null) project.showLabels=false;
  project.floors.forEach(f=>{ if(!f.paths) f.paths=[]; });   // 구버전 마이그레이션
  undoStack=[]; updateUndoBtn(); clearModes(); switchTab('hist'); initPathBar();
  if(project.floors.length && project.floors[0].spaces.length===0 && project.history.length===0) seedDemo(project.floors[0]);
  persist(); rebuildScene(); renderAll();
}
function seedDemo(f){ f.name='2층';f.level=2;f.w=44;f.d=30;
  const D=[['외래 접수·대기','로비·공용',-15,-9,12,8],['외래 진료실 A','외래·진료',-3,-10,8,6],['외래 진료실 B','외래·진료',6,-10,8,6],
    ['영상검사(CT/MR)','검사·영상',15,-8,10,9],['처치·주사실','외래·진료',-14,4,9,7],['약제부','약제·공급',-2,5,8,6],
    ['원무·행정','행정·사무',8,5,9,6],['직원 휴게','편의·후생',16,6,8,6]];
  f.spaces=D.map(([n,c,x,z,w,d])=>({id:uid(),name:n,category:c,shape:'box',x,z,w,d,h:3,memo:''})); }
boot();
window.addEventListener('resize',resize);
